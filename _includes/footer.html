<footer class="site-footer h-card">
  <data class="u-url" href="{{ "/" | relative_url }}"></data>

  <div class="wrapper">
    <h2 class="footer-heading">{{ site.title | escape }}</h2>

    <div class="footer-col-wrapper">
      <div class="footer-col footer-col-1">
        <ul class="contact-list">
          <li class="p-name">{{ site.author.name }}</li>
          <li><a class="u-email" href="mailto:{{ site.author.email }}">{{ site.author.email }}</a></li>
        </ul>
      </div>

      <div class="footer-col footer-col-2">
        <ul class="social-media-list">
          <li>
            <a href="https://github.com/MyoungSoo7">
              <svg class="svg-icon" viewBox="0 0 16 16" width="16" height="16"><path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
              <span>MyoungSoo7</span>
            </a>
          </li>
        </ul>
      </div>

      <div class="footer-col footer-col-3">
        <p>{{ site.description | escape }}</p>
        <p><a href="https://iamipro.tistory.com">티스토리 블로그</a> · <a href="https://blog.lemuel.co.kr">Ghost 블로그</a> · <a href="https://velog.io/@iamipro/posts">Velog</a> · <a href="https://medium.com/@jinsim37">Medium</a> · <a href="https://myoungsoo7.github.io/MyPage/">My Page</a></p>
      </div>
    </div>

    {%- if site.goatcounter_code -%}
    <div class="visitor-count" data-gc="{{ site.goatcounter_code }}" aria-label="방문자 수"
         style="text-align:center;margin-top:20px;color:#828282;font-size:14px;">
      <span class="visitor-count__inner" hidden>👀 오늘 <strong class="vc-today">–</strong>명 · 누적 <strong class="vc-total">–</strong>명</span>
    </div>
    {%- endif -%}

  </div>

  {%- if site.goatcounter_code -%}
  <!-- GoatCounter: 프라이버시 친화(쿠키 없음) 방문자 카운팅. 추적 스크립트는 페이지 어디에 둬도 됨. -->
  <script data-goatcounter="https://{{ site.goatcounter_code }}.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script>
  (function () {
    var el = document.querySelector('.visitor-count');
    if (!el) return;
    var code = el.getAttribute('data-gc');
    if (!code) return;
    var base = 'https://' + code + '.goatcounter.com/counter/TOTAL.json';
    var num = function (x) { return parseInt(String(x == null ? '' : x).replace(/[^0-9]/g, ''), 10) || 0; };
    var pick = function (d) { return d && (d.count_unique != null ? d.count_unique : d.count); };
    var today = function () {
      var n = new Date(), z = function (v) { return (v < 10 ? '0' : '') + v; };
      return n.getFullYear() + '-' + z(n.getMonth() + 1) + '-' + z(n.getDate());
    };
    Promise.all([
      fetch(base).then(function (r) { return r.json(); }),
      fetch(base + '?start=' + today()).then(function (r) { return r.json(); })
    ]).then(function (res) {
      el.querySelector('.vc-total').textContent = num(pick(res[0])).toLocaleString();
      el.querySelector('.vc-today').textContent = num(pick(res[1])).toLocaleString();
      el.querySelector('.visitor-count__inner').hidden = false;
    }).catch(function () { /* 사이트 코드 미가입/차단 시 조용히 숨김 유지 */ });
  })();
  </script>
  {%- endif -%}
</footer>
