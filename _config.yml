title: "푸른영혼의 별 | Tech Blog"
description: "Java Backend Engineer의 기술 블로그"
url: "https://MyoungSoo7.github.io"
baseurl: ""
theme: minima
author:
  name: "푸른영혼의 별"
  email: "iamipro@naver.com"
plugins:
  - jekyll-feed
  - jekyll-seo-tag
