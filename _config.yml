title: "푸른영혼의 별 | Tech Blog"
description: "Java Backend Engineer의 기술 블로그"
url: "https://MyoungSoo7.github.io"
# GoatCounter 방문자 카운터 사이트 코드 (https://<code>.goatcounter.com 에서 가입해 확보).
# 값이 비어 있으면 카운터/추적이 모두 비활성화됨. 코드를 바꾸면 이 한 줄만 수정.
goatcounter_code: "myoungsoo7"
baseurl: ""
theme: minima

# timezone: 미설정 시 Jekyll / GitHub Pages 가 UTC 로 처리 →
# KST 새벽 시간 (예: 2026-06-26 02:30 KST) 의 글이 *2026-06-25 17:30 UTC*
# 로 변환 → blog index 가 *전날 날짜* 로 잘못 표시 (2026-06-29 발견).
# Asia/Seoul 명시 로 frontmatter 의 +0900 시간 그대로 표시.
timezone: Asia/Seoul
author:
  name: "푸른영혼의 별"
  email: "iamipro@naver.com"
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
paginate: 10
paginate_path: "/page:num/"
# Minima 기본 header 는 site.pages 의 title 있는 페이지 모두 노출 — paginate 가 만드는
# /page2/, /page3/, ... 가 index.html 의 title:"Home" 을 상속해 nav 에 N번 등장.
# 명시적 화이트리스트로 약속된 페이지만 보이게. Home 은 좌측 상단 사이트 제목이 그 역할.
#
# 2026-07-02 About 링크 nav 에서 숨김 — /about/ URL 은 유지 (직접 링크 접근 가능).
# 빈 리스트 유지 이유: header_pages 자체를 삭제 하면 Minima 기본 로직 (전체 노출)
# 으로 되돌아가 paginate 페이지 들이 nav 에 다시 등장. 화이트리스트 로직 만 유지.
header_pages: []
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
permalink: /:year/:month/:day/:title/
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
