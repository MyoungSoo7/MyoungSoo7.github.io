title: "푸른영혼의 별 | Tech Blog"
description: "Java Backend Engineer의 기술 블로그"
url: "https://MyoungSoo7.github.io"
baseurl: ""
theme: minima

# timezone: 미설정 시 Jekyll / GitHub Pages 가 UTC 로 처리 →
# KST 새벽 시간 (예: 2026-06-26 02:30 KST) 의 글이 *2026-06-25 17:30 UTC*
# 로 변환 → blog index 가 *전날 날짜* 로 잘못 표시 (2026-06-29 발견).
# Asia/Seoul 명시 로 frontmatter 의 +0900 시간 그대로 표시.
timezone: Asia/Seoul
author:
  name: "푸른영혼의 별"
  email: "iamipro@naver.com"
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
paginate: 10
paginate_path: "/page:num/"
# Minima 기본 header 는 site.pages 의 title 있는 페이지 모두 노출 — paginate 가 만드는
# /page2/, /page3/, ... 가 index.html 의 title:"Home" 을 상속해 nav 에 N번 등장.
# 명시적 화이트리스트로 약속된 페이지만 보이게. Home 은 좌측 상단 사이트 제목이 그 역할.
header_pages:
  - about.md
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
permalink: /:year/:month/:day/:title/
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
